<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Argus</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: calc(var(--u)*4); }
    .auth { width: 100%; max-width: 400px; display: grid; gap: calc(var(--u)*4); }
    .auth-head { display: flex; align-items: center; gap: 10px; justify-content: center; }
    .auth-head .brand-name { font-size: 20px; font-weight: 650; }
    .auth-sub { text-align: center; color: var(--ink-muted); font-size: 13px; margin-top: -8px; }
    .tabs2 { display: flex; gap: 2px; background: var(--surface-2); border-radius: var(--radius); padding: 3px; }
    .tabs2 button { flex: 1; font: inherit; font-size: 13px; font-weight: 600; padding: 8px; border: none; border-radius: calc(var(--radius) - 2px); background: none; color: var(--ink-muted); cursor: pointer; }
    .tabs2 button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.15); }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; }
    .field input { font: inherit; font-size: 13.5px; padding: calc(var(--u)*1.7) calc(var(--u)*2.2); border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); color: var(--ink); }
    .field input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
    .field .hint { font-size: 11px; color: var(--ink-faint); }
    form { display: grid; gap: calc(var(--u)*2.6); }
    .err { display: none; border: 1px solid color-mix(in srgb, var(--sev-critical) 40%, var(--line)); background: color-mix(in srgb, var(--sev-critical) 8%, transparent); border-radius: var(--radius); padding: 9px 13px; font-size: 12.5px; color: var(--sev-critical); }
    .btn-primary { width: 100%; justify-content: center; }
    .foot { text-align: center; font-size: 11.5px; color: var(--ink-faint); }
  </style>
</head>
<body>
  <div class="auth">
    <div>
      <div class="auth-head"><span class="brand-mark" aria-hidden="true"></span><span class="brand-name">Argus</span></div>
      <p class="auth-sub">Security-first AI observability</p>
    </div>
    <div class="card" style="padding: calc(var(--u)*4);">
      <div class="tabs2" id="tabs">
        <button data-tab="login" class="on" type="button">Sign in</button>
        <button data-tab="signup" type="button">Create account</button>
      </div>

      <div class="err" id="err" style="margin-top:calc(var(--u)*3)"></div>

      <!-- SIGN IN -->
      <form id="loginForm" style="margin-top:calc(var(--u)*3)">
        <div class="field"><label for="li-email">Email</label><input id="li-email" type="email" autocomplete="username" required></div>
        <div class="field"><label for="li-pass">Password</label><input id="li-pass" type="password" autocomplete="current-password" required></div>
        <button class="btn btn-primary" id="loginBtn" type="submit">Sign in</button>
        <div style="text-align:center"><a href="#" id="forgotLink" style="font-size:12px;color:var(--accent);text-decoration:none">Forgot password?</a></div>
      </form>

      <!-- FORGOT PASSWORD -->
      <form id="forgotForm" style="margin-top:calc(var(--u)*3); display:none">
        <p style="font-size:12.5px;color:var(--ink-muted);margin:0">Enter your email and we'll send a link to reset your password.</p>
        <div class="field"><label for="fp-email">Email</label><input id="fp-email" type="email" autocomplete="username" required></div>
        <button class="btn btn-primary" id="forgotBtn" type="submit">Send reset link</button>
        <div style="text-align:center"><a href="#" id="backToLogin" style="font-size:12px;color:var(--accent);text-decoration:none">← Back to sign in</a></div>
      </form>

      <!-- CREATE ACCOUNT -->
      <form id="signupForm" style="margin-top:calc(var(--u)*3); display:none">
        <div class="field"><label for="su-name">Your name</label><input id="su-name" type="text" autocomplete="name"></div>
        <div class="field"><label for="su-email">Work email</label><input id="su-email" type="email" autocomplete="username" required></div>
        <div class="field"><label for="su-company">Company / workspace</label><input id="su-company" type="text" autocomplete="organization" placeholder="Acme Corp"><span class="hint">Your applications live under this. You can add more later.</span></div>
        <div class="field"><label for="su-pass">Password</label><input id="su-pass" type="password" autocomplete="new-password" required><span class="hint">At least 8 characters.</span></div>
        <button class="btn btn-primary" id="signupBtn" type="submit">Create account</button>
      </form>
    </div>
    <p class="foot">Your account governs which applications' data you can see.</p>
  </div>
  <script src="/login.js"></script>
</body>
</html>
