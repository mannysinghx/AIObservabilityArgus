# Argus — full platform, one command. For self-hosting on a VM.
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# Brings up infra (ClickHouse, Postgres, Redis, MinIO), runs migrations once,
# then starts the detection service, ingestion API, and workers. Everything is
# wired over the internal compose network — the only host port you must expose
# is the ingestion API (3001).
name: argus-prod

x-app-env: &app-env
  CLICKHOUSE_HTTP_URL: http://clickhouse:8123
  CLICKHOUSE_DB: ${CLICKHOUSE_DB:-argus}
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-argus}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-argus}
  DATABASE_URL: postgres://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-argus}@postgres:5432/${POSTGRES_DB:-argus}
  REDIS_URL: redis://redis:6379
  DETECTION_URL: http://detection:8000
  S3_ENDPOINT: http://minio:9000
  S3_BUCKET: ${S3_BUCKET:-argus-payloads}
  DETECTION_ENABLE_L2: ${DETECTION_ENABLE_L2:-false}
  ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
  ALERT_MIN_SEVERITY: ${ALERT_MIN_SEVERITY:-high}

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ulimits: { nofile: { soft: 262144, hard: 262144 } }
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-argus}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-argus}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-argus}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-argus}
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-argus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-argus-secret}
    volumes:
      - minio-data:/data

  # One-shot: apply DB migrations, then exit. App services wait for success.
  migrate:
    build:
      context: ..
      dockerfile: apps/ingest/Dockerfile
    command: ["node", "scripts/migrate.mjs"]
    environment: *app-env
    depends_on:
      clickhouse: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: "no"

  detection:
    build:
      context: ..
      dockerfile: services/detection/Dockerfile
    environment:
      PORT: "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 20

  ingest:
    build:
      context: ..
      dockerfile: apps/ingest/Dockerfile
    # Migrations already run by the `migrate` service; just serve.
    command: ["npx", "tsx", "apps/ingest/src/server.ts"]
    environment:
      <<: *app-env
      INGEST_PORT: "3001"
    ports:
      - "${INGEST_PORT:-3001}:3001"
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      detection: { condition: service_started }
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    environment: *app-env
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      detection: { condition: service_started }
    restart: unless-stopped

volumes:
  clickhouse-data:
  postgres-data:
  redis-data:
  minio-data:
